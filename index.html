<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>Waylo · Кабинеты</title>
<style>
:root{
  --ink:#17222e; --ink-2:#38495a; --muted:#6a7886; --bg:#f5f6f7; --surface:#fff;
  --line:#e4e7ea; --line-2:#eef0f2; --accent:#0f766e; --accent-ink:#0a544e; --accent-soft:#e3f3f0;
  --amber:#9a6a06; --amber-bg:#fbf0d6; --green:#1b6b3a; --green-bg:#ddf2e3; --red:#a32a23; --red-bg:#fbe4e2;
  --gray:#5a6672; --gray-bg:#eceef0; --blue:#1d5fa5; --blue-bg:#e2edf9; --radius:10px;
  --mono:ui-monospace,"SF Mono",Menlo,monospace; --sans:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}
*{box-sizing:border-box} html,body{height:100%;margin:0}
body{font-family:var(--sans);color:var(--ink);background:var(--bg);-webkit-font-smoothing:antialiased;font-size:14px;line-height:1.5}
.topbar{height:56px;background:var(--surface);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:18px;padding:0 20px;position:sticky;top:0;z-index:10}
.brand{display:flex;align-items:baseline;gap:2px;font-weight:600;letter-spacing:-.01em;font-size:16px}
.brand .chev{color:var(--accent);font-weight:700} .brand .kz{color:var(--muted);font-weight:500;font-size:12px;margin-left:4px}
.spacer{flex:1}
.switcher{display:flex;align-items:center;gap:8px}
.switcher select{font-family:inherit;font-size:13px;color:var(--ink);background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:7px 10px;cursor:pointer}
.role-chip{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--accent-ink);background:var(--accent-soft);border-radius:6px;padding:3px 8px;font-weight:600}
.user-email{color:var(--muted);font-size:13px}
.linkbtn{background:none;border:none;color:var(--muted);cursor:pointer;font:inherit;font-size:13px;padding:6px 8px;border-radius:6px}
.linkbtn:hover{color:var(--ink);background:var(--line-2)}
.shell{display:grid;grid-template-columns:212px 1fr;min-height:calc(100vh - 56px)}
.nav{border-right:1px solid var(--line);background:var(--surface);padding:16px 10px}
.nav .kicker{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);padding:6px 10px;margin-top:8px}
.nav button{display:flex;align-items:center;gap:9px;width:100%;text-align:left;background:none;border:none;font:inherit;font-size:13.5px;color:var(--ink-2);padding:9px 10px 9px 12px;border-radius:8px;cursor:pointer;position:relative}
.nav button:hover{background:var(--line-2);color:var(--ink)}
.nav button.active{background:var(--accent-soft);color:var(--accent-ink);font-weight:600}
.nav button.active::before{content:"";position:absolute;left:0;top:8px;bottom:8px;width:3px;background:var(--accent);border-radius:0 3px 3px 0}
.main{padding:24px 28px;max-width:1100px}
.page-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:18px;gap:16px}
.page-head h1{font-size:19px;font-weight:600;margin:0;letter-spacing:-.01em} .page-head .sub{color:var(--muted);font-size:13px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius)} .card+.card{margin-top:16px}
.card-head{padding:13px 16px;border-bottom:1px solid var(--line-2);font-weight:600;font-size:13.5px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.card-empty{padding:28px 16px;color:var(--muted);text-align:center;font-size:13px}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);font-weight:600;padding:8px 12px;border-bottom:1px solid var(--line-2)}
td{padding:11px 12px;border-bottom:1px solid var(--line-2);font-size:13.5px;vertical-align:middle} tr:last-child td{border-bottom:none}
.mono{font-family:var(--mono);font-size:12.5px} .price{font-family:var(--mono);font-weight:600}
.id-cell{font-family:var(--mono);font-size:11.5px;color:var(--muted)}
.badge{display:inline-flex;align-items:center;font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:20px}
.badge--amber{color:var(--amber);background:var(--amber-bg)} .badge--green{color:var(--green);background:var(--green-bg)}
.badge--red{color:var(--red);background:var(--red-bg)} .badge--gray{color:var(--gray);background:var(--gray-bg)}
.badge--blue{color:var(--blue);background:var(--blue-bg)} .badge--accent{color:var(--accent-ink);background:var(--accent-soft)}
.btn{font:inherit;font-size:13px;font-weight:600;border-radius:8px;padding:8px 14px;cursor:pointer;border:1px solid transparent}
.btn--primary{background:var(--accent);color:#fff} .btn--primary:hover{background:var(--accent-ink)}
.btn--ghost{background:var(--surface);color:var(--ink-2);border-color:var(--line)} .btn--ghost:hover{background:var(--line-2);color:var(--ink)}
.btn--sm{padding:6px 11px;font-size:12.5px} .btn:disabled{opacity:.5;cursor:default}
.field{display:flex;flex-direction:column;gap:5px} .field label{font-size:12px;color:var(--muted);font-weight:500}
input,select.input{font:inherit;font-size:13.5px;border:1px solid var(--line);border-radius:8px;padding:8px 10px;background:var(--surface);color:var(--ink)}
input:focus,select:focus{outline:2px solid var(--accent-soft);border-color:var(--accent)}
.row{display:flex;gap:12px;flex-wrap:wrap;align-items:end}
.notice{font-size:12.5px;padding:9px 12px;border-radius:8px;margin:10px 0}
.notice--err{color:var(--red);background:var(--red-bg)} .notice--ok{color:var(--green);background:var(--green-bg)}
.hint{color:var(--muted);font-size:12.5px}
.login-wrap{min-height:100vh;display:grid;place-items:center;background:radial-gradient(120% 120% at 50% 0%,#fff 0%,var(--bg) 60%)}
.login-card{width:360px;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:28px 26px}
.login-card .brand{font-size:22px;margin-bottom:4px} .login-card .tag{color:var(--muted);font-size:13px;margin-bottom:20px}
.login-card .field{margin-bottom:13px} .login-card .btn{width:100%;justify-content:center;margin-top:6px;display:flex}
.login-creds{margin-top:18px;padding-top:16px;border-top:1px solid var(--line-2);font-size:12px;color:var(--muted)}
.login-creds code{font-family:var(--mono);background:var(--line-2);padding:1px 5px;border-radius:4px;color:var(--ink-2)}
.seg-q{font-size:12px;color:var(--muted);font-weight:600;margin-bottom:6px}
.segs{display:flex;gap:6px;margin-bottom:10px}
.segs button{flex:1;font:inherit;font-size:12.5px;font-weight:600;color:var(--muted);background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:9px 6px;cursor:pointer}
.segs button:hover{color:var(--ink)}
.segs button.active{color:var(--accent-ink);background:var(--accent-soft);border-color:var(--accent)}
.seg-sub{font-size:12px;color:var(--muted);margin-bottom:14px;min-height:16px;line-height:1.4}
.op-link{margin-top:10px;font-size:12px;color:var(--muted)}
.op-link a{color:var(--accent-ink);cursor:pointer;text-decoration:underline}
.center-state{display:grid;place-items:center;min-height:60vh;color:var(--muted)}
.stat-row{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:18px}
.stat{flex:1;min-width:140px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px}
.stat .n{font-size:22px;font-weight:600;font-family:var(--mono);letter-spacing:-.02em} .stat .l{font-size:12px;color:var(--muted);margin-top:2px}
.config-warn{max-width:560px;margin:80px auto;padding:24px;border:1px solid var(--amber);background:var(--amber-bg);border-radius:12px;color:#6b4a05;font-size:14px;line-height:1.6}
.config-warn code{font-family:var(--mono);background:#fff;padding:1px 6px;border-radius:4px}
</style>
</head>
<body>
<div id="app"></div>

<!-- supabase-js из CDN (UMD: глобальная переменная `supabase`) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // Логика приложения грузится отдельным файлом ВСЕГДА свежей —
  // метка времени в URL не даёт браузеру/CDN отдавать старую версию.
  var s = document.createElement("script");
  s.src = "app.js?t=" + Date.now();
  document.body.appendChild(s);
</script>
</body>
</html>
