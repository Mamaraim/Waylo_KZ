<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>Waylo · цифровой межкорпоративный контур</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#17211d; --ink-2:#3c4a44; --muted:#76847e; --bg:#f6f7f7; --surface:#ffffff;
  --line:#e6e9e8; --line-2:#eff1f0; --accent:#0f766e; --accent-ink:#0a544e; --accent-soft:#e3f1ee;
  --amber:#9a6a06; --amber-bg:#faf0d6; --green:#1b6b3a; --green-bg:#dcf1e2; --red:#a32a23; --red-bg:#fbe4e2;
  --gray:#5a6672; --gray-bg:#eceef0; --blue:#1d5fa5; --blue-bg:#e6eefb; --radius:12px;
  --mono:"JetBrains Mono",ui-monospace,"SF Mono",Menlo,monospace;
  --sans:"Hanken Grotesk",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}
*{box-sizing:border-box} html,body{height:100%;margin:0}
body{font-family:var(--sans);color:var(--ink);background:var(--bg);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;font-size:14px;line-height:1.5}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#d4dad8;border-radius:8px;border:2px solid var(--bg)}

/* ── brand ── */
.brand{display:flex;align-items:baseline;gap:2px;font-weight:600;letter-spacing:-.01em;font-size:16px}
.brand .chev{color:var(--accent);font-weight:700} .brand .kz{color:var(--muted);font-weight:500;font-size:12px;margin-left:4px}

/* ════════ APP SHELL (Atlas: sidebar + header) ════════ */
.appwrap{display:grid;grid-template-columns:248px 1fr;min-height:100vh}
.sidebar{background:var(--surface);border-right:1px solid var(--line);display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.side-brand{padding:22px 22px 16px;border-bottom:1px solid var(--line-2);font-family:var(--mono);font-weight:600;font-size:18px;letter-spacing:.01em;color:var(--ink)}
.side-brand span{color:var(--accent);margin-left:4px}
.side-cab{padding:14px 14px 6px;display:flex;flex-direction:column;gap:9px}
.side-cab select{width:100%;font-family:inherit;font-size:13px;color:var(--ink);background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:8px 10px;cursor:pointer}
.org-chip{display:flex;align-items:center;gap:9px;padding:8px 10px;background:var(--bg);border-radius:10px}
.org-tag{width:28px;height:28px;border-radius:7px;background:var(--accent-soft);color:var(--accent-ink);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;font-family:var(--mono);flex:none}
.org-meta{min-width:0}
.org-name{font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.org-role{font-size:10.5px;color:var(--muted);text-transform:lowercase}
.side-nav{padding:8px 10px;flex:1;overflow:auto}
.side-nav button{display:flex;align-items:center;gap:11px;width:100%;text-align:left;background:none;border:none;font:inherit;font-size:14px;font-weight:500;color:var(--ink-2);padding:9px 10px;border-radius:9px;cursor:pointer;margin-bottom:2px}
.side-nav button:hover{background:var(--line-2);color:var(--ink)}
.side-nav button.active{background:var(--accent-soft);color:var(--accent-ink);font-weight:600}
.side-nav button .ndot{width:7px;height:7px;border-radius:2px;background:var(--line);flex:none}
.side-nav button.active .ndot{background:var(--accent)}
.side-logout{padding:14px 18px;border:none;border-top:1px solid var(--line-2);background:none;font:inherit;font-size:13px;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:8px;text-align:left}
.side-logout:hover{color:var(--ink)} .side-logout .dot{width:7px;height:7px;border-radius:50%;background:var(--muted)}
.appmain{min-width:0;display:flex;flex-direction:column}
.apphead{position:sticky;top:0;z-index:5;background:rgba(246,247,247,.86);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:17px 32px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.ah-title{font-size:18px;font-weight:600;letter-spacing:-.01em}
.ah-sub{font-size:13px;color:var(--muted);margin-top:1px}
.ah-right{display:flex;align-items:center;gap:12px}
.user-email{color:var(--muted);font-size:13px}
.appcontent{padding:28px 32px 64px;max-width:1240px}

/* ── page head ── */
.page-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:18px;gap:16px}
.page-head h1{font-size:19px;font-weight:600;margin:0;letter-spacing:-.01em} .page-head h2{margin:0}
.page-head .sub{color:var(--muted);font-size:13px}

/* ── cards ── */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden} .card+.card{margin-top:16px}
.card-head{padding:14px 18px;border-bottom:1px solid var(--line-2);font-weight:600;font-size:14px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.card-empty{padding:30px 18px;color:var(--muted);text-align:center;font-size:13px}

/* ── tables ── */
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:600;padding:11px 18px;border-bottom:1px solid var(--line-2)}
td{padding:13px 18px;border-bottom:1px solid var(--line-2);font-size:13.5px;vertical-align:middle} tr:last-child td{border-bottom:none}
.mono{font-family:var(--mono);font-size:12.5px} .price{font-family:var(--mono);font-weight:600}
.id-cell{font-family:var(--mono);font-size:11.5px;color:var(--muted)}

/* ── badges ── */
.badge{display:inline-flex;align-items:center;font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:20px}
.badge--amber{color:var(--amber);background:var(--amber-bg)} .badge--green{color:var(--green);background:var(--green-bg)}
.badge--red{color:var(--red);background:var(--red-bg)} .badge--gray{color:var(--gray);background:var(--gray-bg)}
.badge--blue{color:var(--blue);background:var(--blue-bg)} .badge--accent{color:var(--accent-ink);background:var(--accent-soft)}

/* ── buttons ── */
.btn{font:inherit;font-size:13px;font-weight:600;border-radius:9px;padding:8px 15px;cursor:pointer;border:1px solid transparent}
.btn--primary{background:var(--accent);color:#fff} .btn--primary:hover{background:var(--accent-ink)}
.btn--ghost{background:var(--surface);color:var(--ink-2);border-color:var(--line)} .btn--ghost:hover{background:var(--line-2);color:var(--ink)}
.btn--sm{padding:6px 12px;font-size:12.5px} .btn:disabled{opacity:.5;cursor:default}

/* ── forms ── */
.field{display:flex;flex-direction:column;gap:5px} .field label{font-size:12px;color:var(--muted);font-weight:500}
input,select.input,select{font-family:inherit;font-size:13.5px;border:1px solid var(--line);border-radius:9px;padding:9px 11px;background:var(--surface);color:var(--ink)}
input:focus,select:focus{outline:2px solid var(--accent-soft);border-color:var(--accent)}
.row{display:flex;gap:12px;flex-wrap:wrap;align-items:end}
.notice{font-size:12.5px;padding:10px 13px;border-radius:9px;margin:10px 0}
.notice--err{color:var(--red);background:var(--red-bg)} .notice--ok{color:var(--green);background:var(--green-bg)}
.hint{color:var(--muted);font-size:12.5px}
.center-state{display:grid;place-items:center;min-height:50vh;color:var(--muted)}

/* ── stats ── */
.stat-row{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:18px}
.stat{flex:1;min-width:150px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px}
.stat .n{font-size:28px;font-weight:600;font-family:var(--mono);letter-spacing:-.02em} .stat .l{font-size:12px;color:var(--muted);margin-top:4px}

/* ════════ DASHBOARD ════════ */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px}
.kpi .label{font-size:12.5px;color:var(--muted);font-weight:500}
.kpi .value{font-size:30px;font-weight:600;letter-spacing:-.02em;margin-top:8px;font-family:var(--mono)}
.kpi .delta{font-size:12px;margin-top:6px;font-weight:500}
.dash-grid{display:grid;grid-template-columns:1.5fr 1fr;gap:16px;margin-top:16px;align-items:start}
.act-row{display:flex;align-items:center;gap:14px;padding:13px 18px;border-top:1px solid var(--line-2)}
.act-dot{width:9px;height:9px;border-radius:3px;flex:none}
.jrn-row{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--line-2)}
.jrn-dot{width:8px;height:8px;border-radius:50%;margin-top:6px;flex:none}

/* ════════ LOGIN (без изменений — старый вход) ════════ */
.login-wrap{min-height:100vh;display:grid;place-items:center;background:radial-gradient(120% 120% at 50% 0%,#fff 0%,var(--bg) 60%)}
.login-card{width:360px;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:28px 26px}
.login-card .brand{font-size:22px;margin-bottom:4px} .login-card .tag{color:var(--muted);font-size:13px;margin-bottom:20px}
.login-card .field{margin-bottom:13px} .login-card .btn{width:100%;justify-content:center;margin-top:6px;display:flex}
.login-creds{margin-top:18px;padding-top:16px;border-top:1px solid var(--line-2);font-size:12px;color:var(--muted)}
.login-creds code{font-family:var(--mono);background:var(--line-2);padding:1px 5px;border-radius:4px;color:var(--ink-2)}
.seg-q{font-size:12px;color:var(--muted);font-weight:600;margin-bottom:6px}
.segs{display:flex;gap:6px;margin-bottom:10px}
.segs button{flex:1;font:inherit;font-size:12.5px;font-weight:600;color:var(--muted);background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:9px 6px;cursor:pointer}
.segs button:hover{color:var(--ink)}
.segs button.active{color:var(--accent-ink);background:var(--accent-soft);border-color:var(--accent)}
.seg-sub{font-size:12px;color:var(--muted);margin-bottom:14px;min-height:16px;line-height:1.4}
.op-link{margin-top:10px;font-size:12px;color:var(--muted)}
.op-link a{color:var(--accent-ink);cursor:pointer;text-decoration:underline}
.config-warn{max-width:560px;margin:80px auto;padding:24px;border:1px solid var(--amber);background:var(--amber-bg);border-radius:12px;color:#6b4a05;font-size:14px;line-height:1.6}
.config-warn code{font-family:var(--mono);background:#fff;padding:1px 6px;border-radius:4px}

@media (max-width:760px){
  .appwrap{grid-template-columns:1fr} .sidebar{position:static;height:auto;flex-direction:column}
  .side-nav{display:flex;flex-wrap:wrap} .side-nav button{width:auto}
  .appcontent{padding:18px 16px 48px} .apphead{padding:14px 16px}
  .kpi-grid{grid-template-columns:1fr 1fr} .dash-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div id="app"><div style="min-height:100vh;display:grid;place-items:center;color:#7a8a99;font-family:system-ui,sans-serif">Загрузка…</div></div>

<script>
  // Финальный загрузчик. Вся логика в app.js (грузится свежим). Supabase — с запасным CDN.
  (function () {
    var appEl = document.getElementById('app');
    function show(html) {
      appEl.innerHTML = '<div style="min-height:100vh;display:grid;place-items:center;text-align:center;font-family:system-ui,sans-serif;color:#334"><div style="max-width:440px;padding:24px;line-height:1.55">' + html + '<br><br><button onclick="location.reload(true)" style="padding:10px 18px;border:0;background:#0a7;color:#fff;border-radius:8px;cursor:pointer">Обновить</button></div></div>';
    }
    window.addEventListener('error', function (e) {
      if (appEl && appEl.textContent.indexOf('Загрузка') !== -1) {
        show('Ошибка при запуске:<br><code style="color:#b00">' + ((e && e.message) || 'неизвестная ошибка') + '</code>');
      }
    });
    function loadScript(src, onload, onerror) {
      var s = document.createElement('script'); s.src = src; s.onload = onload; s.onerror = onerror;
      document.head.appendChild(s);
    }
    function loadApp() {
      loadScript('app.js?t=' + Date.now(), null, function () {
        show('Не удалось загрузить приложение (app.js). Проверьте, что файл лежит в репозитории.');
      });
    }
    loadScript('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2', loadApp, function () {
      loadScript('https://unpkg.com/@supabase/supabase-js@2', loadApp, function () {
        show('Не удалось загрузить библиотеку Supabase. Возможно, её блокирует расширение браузера — отключите его для этого сайта и нажмите «Обновить».');
      });
    });
  })();
</script>
</body>
</html>
